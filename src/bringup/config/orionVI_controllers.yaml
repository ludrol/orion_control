controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    swerve_drive_controller:
      type: swerve_drive_controller/SwerveController


swerve_drive_controller:
  ros__parameters:
      front_left_wheel_joint: "left_front_wheel_joint"
      front_right_wheel_joint: "right_front_wheel_joint"
      rear_left_wheel_joint: "left_rear_wheel_joint"
      rear_right_wheel_joint: "right_rear_wheel_joint"
      
      front_left_axle_joint: "left_front_turntable_joint"
      front_right_axle_joint: "right_front_turntable_joint"
      rear_left_axle_joint: "left_rear_turntable_joint"
      rear_right_axle_joint: "right_rear_turntable_joint"
      
      wheelbase: 0.840 
      trackwidth: 0.843
      wheel_radius: 0.21
      
      front_left_velocity_threshold: 2.0
      front_right_velocity_threshold: 2.0
      rear_left_velocity_threshold: 2.0
      rear_right_velocity_threshold: 2.0

      max_steering_angles: [0.25, 0.5]
      
      pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
      twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]